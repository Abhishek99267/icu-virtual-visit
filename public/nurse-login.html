<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nurse Secure Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* background: linear-gradient(135deg, #eef4ff, #f8fbff); */
      font-family: Arial;
    }

    .nurse-login-box {
      width: 600px;
      background: transparent;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .nurse-login-box h1 {
      text-align: center;
      color: #0d47a1;
      margin-bottom: 20px;
    }

   

    input {
  width: 100%;
  padding: 14px 18px;
  margin: 12px 0;
  border-radius: 30px;
  border: 1px solid #cfd8e3;
  outline: none;
  font-size: 15px;
  transition: 0.3s;
  box-sizing: border-box;
}
input:focus {
  border-color: #0d47a1;
  box-shadow: 0 0 0 4px rgba(13, 71, 161, 0.12);
}

    button {
      width: 100%;
      padding: 12px;
      background: #0d47a1;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }


    
    body{
      /* background-color:cadetblue; */
      flex: 1;
  padding: 40px;
  background: linear-gradient(
      rgba(255,255,255,0.25),
      rgba(255,255,255,0.25)
    ),
    url("jadon.jpg") no-repeat center center/cover;
    }

    #c1{
      font-size:40px;
      color:#001540;
    }
  

  </style>
</head>
<body>
  <div class="nurse-login-box">
    <h1 id="c1">👩‍⚕️<b>Nurse Login</b></h1>

    <input id="nurseId" placeholder="Enter Nurse ID">
    <input id="nursePassword" type="password" placeholder="Enter Password">

    <button onclick="nurseLogin()">Login</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
